name: SRVoyages Local SEO — Daily Monitor & IndexNow

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  seo-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: IndexNow full submission (all sitemap URLs)
        run: python indexnow-submit.py
      - name: SEO rank monitor & health check
        run: python rank-tracker.py
      - name: NAP citation checker (8 directories)
        run: python citation-checker.py