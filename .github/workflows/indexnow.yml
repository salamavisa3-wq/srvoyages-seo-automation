name: SRVoyages Local SEO â€” Daily Monitor & IndexNow

on:
  schedule:
    - cron: '0 6 * * *'  # Daily at 06:00 UTC (07:00 Dakar)
  workflow_dispatch:

jobs:
  seo-monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Run SEO monitor & IndexNow submission
        run: python rank-tracker.py
      - name: Run IndexNow full submission
        run: python indexnow-submit.py
